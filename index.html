<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор идей для постов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f0e17;
      --surface: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.12);
      --text: #fffffe;
      --muted: #a7a9be;
      --accent: #ff8906;
      --accent-soft: rgba(255, 137, 6, 0.15);
      --glow: #7f5af0;
    }

    body {
      min-height: 100vh;
      font-family: "Manrope", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      overflow-x: hidden;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.45;
      pointer-events: none;
      z-index: 0;
    }

    .bg-orb--1 {
      width: 420px;
      height: 420px;
      background: var(--glow);
      top: -120px;
      right: -80px;
      animation: float 9s ease-in-out infinite;
    }

    .bg-orb--2 {
      width: 360px;
      height: 360px;
      background: var(--accent);
      bottom: -100px;
      left: -60px;
      animation: float 11s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(24px, -20px) scale(1.06); }
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid rgba(255, 137, 6, 0.3);
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards;
    }

    h1 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.1s forwards;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.7s ease 0.2s forwards;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }

    li {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.125rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      cursor: default;
      opacity: 0;
      transform: translateY(20px);
      transition:
        transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
        border-color 0.3s ease,
        background 0.3s ease,
        box-shadow 0.3s ease;
    }

    li:nth-child(1) { animation: fadeUp 0.7s ease 0.35s forwards; }
    li:nth-child(2) { animation: fadeUp 0.7s ease 0.5s forwards; }
    li:nth-child(3) { animation: fadeUp 0.7s ease 0.65s forwards; }

    li:hover {
      transform: translateY(-4px) scale(1.01);
      border-color: rgba(255, 137, 6, 0.4);
      background: rgba(255, 255, 255, 0.09);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255, 137, 6, 0.1);
    }

    .icon {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      background: var(--accent-soft);
      border-radius: 12px;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    li:hover .icon {
      transform: rotate(-8deg) scale(1.1);
    }

    .item-text {
      font-weight: 600;
      font-size: 1rem;
      line-height: 1.4;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--2" aria-hidden="true"></div>

  <main class="page">
    <span class="badge">Контент-инструмент</span>
    <h1>Генератор идей для постов</h1>
    <p class="subtitle">Выберите формат — и получите готовые идеи для публикаций.</p>

    <ul>
      <li>
        <span class="icon" aria-hidden="true">💡</span>
        <span class="item-text">5 идей постов для экспертов</span>
      </li>
      <li>
        <span class="icon" aria-hidden="true">📱</span>
        <span class="item-text">3 идеи сторис на сегодня</span>
      </li>
      <li>
        <span class="icon" aria-hidden="true">📅</span>
        <span class="item-text">Контент план на неделю</span>
      </li>
    </ul>
  </main>
</body>
</html>
